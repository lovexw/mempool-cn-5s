<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Block Dashboard</title>
    <style>
        body {
            background-color: #000;
            color: #f7931a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .title {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 10px;
        }
        .height {
            font-size: 6rem; 
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 10px rgba(247, 147, 26, 0.5);
        }
        .details {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 15px;
        }
        .status {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #0f0; 
        }
        .disconnected {
            color: #f00;
        }
    </style>
</head>
<body>

    <div class="title">最新区块高度</div>
    <div class="height" id="blockHeight">加载中...</div>
    <div class="details" id="blockTime">等待新区块...</div>
    <div class="status" id="wsStatus">🟡 准备连接...</div>

    <script>
        const heightEl = document.getElementById('blockHeight');
        const timeEl = document.getElementById('blockTime');
        const statusEl = document.getElementById('wsStatus');
        let pingInterval; 

        function connectWS() {
            // 这里已经写死了你专属的代理域名
            const ws = new WebSocket('wss://mempool-cn.btchao.com');

            ws.onopen = () => {
                statusEl.textContent = '🟢 已连接实时网络';
                statusEl.className = 'status';
                
                // 告诉服务器我们需要订阅区块信息
                ws.send(JSON.stringify({ "action": "want", "data": ["blocks"] }));
                
                // 30秒心跳保活机制，防止 Cloudflare 掐断连接
                pingInterval = setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ "action": "ping" }));
                        console.log("Ping sent: 30s heartbeat");
                    }
                }, 30000); 
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.block) {
                    const block = data.block;
                    heightEl.textContent = block.height;
                    
                    const date = new Date(block.timestamp * 1000);
                    const timeString = date.toLocaleTimeString('zh-CN', { hour12: false });
                    const sizeMB = (block.size / 1000000).toFixed(2);
                    
                    timeEl.textContent = `出块时间: ${timeString} | 大小: ${sizeMB} MB`;
                }
                
                if (data.blocks && data.blocks.length > 0) {
                    heightEl.textContent = data.blocks[0].height;
                    const date = new Date(data.blocks[0].timestamp * 1000);
                    timeEl.textContent = `最新时间: ${date.toLocaleTimeString('zh-CN', { hour12: false })}`;
                }
            };

            ws.onclose = () => {
                clearInterval(pingInterval);
                statusEl.textContent = '🔴 连接断开，3秒后重连...';
                statusEl.className = 'status disconnected';
                setTimeout(connectWS, 3000);
            };

            ws.onerror = () => {
                statusEl.textContent = '🔴 网络错误';
                statusEl.className = 'status disconnected';
            };
        }

        connectWS();
    </script>
</body>
</html>
