<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BTC Block Dashboard</title>
    <style>
        body {
            background-color: #000;
            color: #f7931a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* 彻底干掉页面的滑动和多点触控 */
        }
        
        /* 默认样式（针对稍大一点的屏幕） */
        .title {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 10px;
        }
        .height {
            font-size: 6rem; 
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 10px rgba(247, 147, 26, 0.5);
            white-space: nowrap; /* 铁血防折行 */
        }
        .details {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 15px;
            white-space: nowrap;
        }
        .status {
            position: absolute;
            bottom: 25px;
            font-size: 0.8rem;
            color: #0f0; 
        }
        .disconnected {
            color: #f00;
        }

        /* 📱 核心修复：专门针对 iPhone 5s (320px) 和类似小屏的自适应缩放 */
        @media screen and (max-width: 375px) {
            .title { 
                font-size: 1.2rem; 
                margin-bottom: 8px;
            }
            .height { 
                font-size: 4.2rem; /* 缩小字号，保证6位数完美填满 320px 宽度 */
            }
            .details { 
                font-size: 0.95rem; 
                margin-top: 12px;
            }
            .status { 
                bottom: 15px; 
                font-size: 0.75rem; 
            }
        }
    </style>
</head>
<body>

    <div class="title">最新区块高度</div>
    <div class="height" id="blockHeight">加载中...</div>
    <div class="details" id="blockTime">等待新区块...</div>
    <div class="status" id="wsStatus">🟡 准备连接...</div>

    <script>
        const heightEl = document.getElementById('blockHeight');
        const timeEl = document.getElementById('blockTime');
        const statusEl = document.getElementById('wsStatus');
        
        let ws;
        let pingInterval;
        let forceReconnectTimeout;

        function connectWS() {
            if (pingInterval) clearInterval(pingInterval);
            if (forceReconnectTimeout) clearTimeout(forceReconnectTimeout);

            // 你的专属白嫖节点
            ws = new WebSocket('wss://mempool-cn.btchao.com');

            ws.onopen = () => {
                statusEl.textContent = '🟢 实时同步中';
                statusEl.className = 'status';
                
                ws.send(JSON.stringify({ "action": "want", "data": ["blocks"] }));
                
                pingInterval = setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ "action": "ping" }));
                    }
                }, 30000);

                forceReconnectTimeout = setTimeout(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        statusEl.textContent = '🔄 定时防死机刷新...';
                        ws.close(); 
                    }
                }, 300000); 
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.block) {
                    updateUI(data.block);
                }
                
                if (data.blocks && data.blocks.length > 0) {
                    updateUI(data.blocks[0]);
                }
            };

            ws.onclose = () => {
                statusEl.textContent = '🔴 连接重置中...';
                statusEl.className = 'status disconnected';
                setTimeout(connectWS, 2000);
            };

            ws.onerror = () => {
                statusEl.textContent = '🔴 网络波动...';
                statusEl.className = 'status disconnected';
            };
        }

        function updateUI(blockData) {
            heightEl.textContent = blockData.height;
            const date = new Date(blockData.timestamp * 1000);
            const timeString = date.toLocaleTimeString('zh-CN', { hour12: false });
            const sizeMB = (blockData.size / 1000000).toFixed(2);
            timeEl.textContent = `出块时间: ${timeString} | 大小: ${sizeMB} MB`;
        }

        connectWS();
    </script>
</body>
</html>
