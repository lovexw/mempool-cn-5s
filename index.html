<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BTC Block Dashboard</title>
    <style>
        body {
            background-color: #000;
            color: #f7931a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .title {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 10px;
        }
        .height {
            font-size: 6rem; 
            font-weight: bold;
            margin: 0;
            text-shadow: 0 0 10px rgba(247, 147, 26, 0.5);
        }
        .details {
            font-size: 1.2rem;
            color: #aaa;
            margin-top: 15px;
        }
        .status {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #0f0; 
        }
        .disconnected {
            color: #f00;
        }
    </style>
</head>
<body>

    <div class="title">最新区块高度</div>
    <div class="height" id="blockHeight">加载中...</div>
    <div class="details" id="blockTime">等待新区块...</div>
    <div class="status" id="wsStatus">🟡 准备连接...</div>

    <script>
        const heightEl = document.getElementById('blockHeight');
        const timeEl = document.getElementById('blockTime');
        const statusEl = document.getElementById('wsStatus');
        
        let ws;
        let pingInterval;
        let forceReconnectTimeout;

        function connectWS() {
            // 清理旧的定时器，防止重连时叠加爆内存
            if (pingInterval) clearInterval(pingInterval);
            if (forceReconnectTimeout) clearTimeout(forceReconnectTimeout);

            // 这里写死你专属的代理域名
            ws = new WebSocket('wss://mempool-cn.btchao.com');

            ws.onopen = () => {
                statusEl.textContent = '🟢 实时同步中';
                statusEl.className = 'status';
                
                // 订阅区块推送
                ws.send(JSON.stringify({ "action": "want", "data": ["blocks"] }));
                
                // 维持 CF 活跃的常规 30 秒 Ping
                pingInterval = setInterval(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ "action": "ping" }));
                    }
                }, 30000);

                // 【终极必杀技：防僵尸连接】
                // 无论当前连接状态多好，每隔 5 分钟 (300000 毫秒) 强行斩断重连，重新拉取最新数据
                forceReconnectTimeout = setTimeout(() => {
                    if (ws.readyState === WebSocket.OPEN) {
                        statusEl.textContent = '🔄 定时防死机刷新...';
                        ws.close(); // 主动掐断，会立刻触发下面的 onclose 进行重连
                    }
                }, 300000); 
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // 收到服务器主动推送的新区块
                if (data.block) {
                    updateUI(data.block);
                }
                
                // 每次刚连接/重连时，拉取到的最新区块缓存
                if (data.blocks && data.blocks.length > 0) {
                    updateUI(data.blocks[0]);
                }
            };

            ws.onclose = () => {
                statusEl.textContent = '🔴 连接重置中...';
                statusEl.className = 'status disconnected';
                setTimeout(connectWS, 2000);
            };

            ws.onerror = () => {
                statusEl.textContent = '🔴 网络波动...';
                statusEl.className = 'status disconnected';
            };
        }

        // 把更新界面的逻辑独立出来，保持代码干净
        function updateUI(blockData) {
            heightEl.textContent = blockData.height;
            const date = new Date(blockData.timestamp * 1000);
            const timeString = date.toLocaleTimeString('zh-CN', { hour12: false });
            const sizeMB = (blockData.size / 1000000).toFixed(2);
            timeEl.textContent = `出块时间: ${timeString} | 大小: ${sizeMB} MB`;
        }

        // 启动连接
        connectWS();
    </script>
</body>
</html>
